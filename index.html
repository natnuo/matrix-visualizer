<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Matrix Visualizer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="app">
      <div class="app-chrome">
        <header class="header">
          <h1>Matrix visualizer</h1>
          <p class="subtitle">
            Edit values from 0.0 (black) to 1.0 (white). Grid size up to 10×10.
          </p>
        </header>

        <section class="toolbar" aria-label="Matrix controls">
          <div class="field">
            <label for="rows">Rows</label>
            <input id="rows" type="number" min="1" max="10" value="5" />
          </div>
          <div class="field">
            <label for="cols">Columns</label>
            <input id="cols" type="number" min="1" max="10" value="5" />
          </div>
          <button type="button" id="apply-size" class="btn btn-secondary">
            Apply size
          </button>
          <div class="toolbar-divider" role="presentation"></div>
          <button type="button" id="export-png" class="btn btn-primary">
            Download PNG
          </button>
          <button type="button" id="export-clipboard" class="btn btn-primary">
            Copy image
          </button>
        </section>

        <p id="status" class="status" role="status" aria-live="polite"></p>
      </div>

      <div class="matrix-viewport">
        <div id="matrix-wrap" class="matrix-wrap">
          <div id="matrix" class="matrix" aria-label="Editable value matrix"></div>
        </div>
      </div>
    </div>

    <script src="app.js"></script>
  </body>
</html>
